name: List Aircall Users
on:
  workflow_dispatch:
jobs:
  list-users:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx scripts/list-aircall-users.ts
        env:
          AIRCALL_API_ID: ${{ secrets.AIRCALL_API_ID }}
          AIRCALL_API_TOKEN: ${{ secrets.AIRCALL_API_TOKEN }}
